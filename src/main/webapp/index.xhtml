<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Slider Game</title>
        <style>
            canvas { border: 1px solid black; }
        </style>
    </h:head>
    <h:body>
        <h:outputText value="Welcome to the Slider Game!" />
        <br/>

        <!-- Debugging Output: Display Loaded Sliders -->
        <h:outputText value="Loaded Sliders: #{sliderBean.sliders}" />

        <!-- Table displaying slider attributes -->
        <h:form>
            <h:dataTable value="#{sliderBean.sliders}" var="slider">
                <h:column>
                    <f:facet name="header">Slider ID</f:facet>
                    #{slider.id}
                </h:column>
                <h:column>
                    <f:facet name="header">X Position</f:facet>
                    #{slider.x}
                </h:column>
                <h:column>
                    <f:facet name="header">Max Travel</f:facet>
                    #{slider.maxTravel}
                </h:column>
            </h:dataTable>

            <!-- AJAX button to refresh sliders -->
            <h:commandButton value="Refresh Sliders" action="#{sliderBean.refreshSliders}">
                <f:ajax execute="@this" render="@form"/>
            </h:commandButton>
        </h:form>

        <!-- Canvas to render sliders -->
        <canvas id="sliderCanvas" width="800" height="400"></canvas>

        <script>
    window.onload = function() {
        console.log("Starting slider fetch...");
        fetchSliders(); // Run once immediately
        setInterval(fetchSliders, 1000); // Continue every second
    };

    function fetchSliders() {
        console.log("Fetching sliders...");
        
        // --- THIS IS THE CRUCIAL CHANGE ---
        fetch("/Web-Enterprise-App/resources/cst8218.foko0002.slider.entity.slider")
            .then(response => {
                console.log("Response status:", response.status);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(sliders => {
                console.log("Fetched sliders:", sliders);
                if (sliders.length > 0) {
                    drawSliders(sliders);
                } else {
                    console.warn("No sliders received from API.");
                }
            })
            .catch(error => console.error("Error fetching sliders:", error));
    }

    function drawSliders(sliders) {
        var canvas = document.getElementById("sliderCanvas");
        var ctx = canvas.getContext("2d");

        if (!canvas || !ctx) {
            console.error("Canvas or context not found!");
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        sliders.forEach(slider => {
            // Check if 'currentTravel' exists, otherwise use 'x' for drawing
            // If you intend to animate, ensure your backend provides 'currentTravel'
            const positionToDraw = slider.currentTravel !== undefined ? slider.x + slider.currentTravel : slider.x;
            console.log(`Drawing slider: ID=${slider.id}, X=${slider.x}, CurrentTravel=${slider.currentTravel}, Drawing at ${positionToDraw}`);
            ctx.fillStyle = "black";
            ctx.fillRect(positionToDraw, 200, 50, 10);
        });
    }
</script>
    </h:body>
</html>
